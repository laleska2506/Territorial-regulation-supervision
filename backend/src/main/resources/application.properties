# =========================================================
# SUNASS Regulatorio - Application Configuration
# =========================================================

spring.application.name=regulatorio

# =========================================================
# Server
# =========================================================
server.port=8080

# =========================================================
# PostgreSQL DataSource
# =========================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/sunass_regulatorio
spring.datasource.username=postgres
spring.datasource.password=laleska
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JPA / Hibernate
# =========================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =========================================================
# Flyway
# =========================================================
spring.flyway.enabled=false

# =========================================================
# Gemini AI
# =========================================================
gemini.api-key=AIzaSyCLEfwzaTzAjEYwdZKKjp9UUO8PYJFbz1w
gemini.model=gemini-2.0-flash

# =========================================================
# Jackson
# =========================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

# =========================================================
# Swagger / OpenAPI
# =========================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
